<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Responsive Background & Layout */
        body {
            background: linear-gradient(135deg, #2c3e50, #4ca1af);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container adjustment for very small screens */
        .main-container {
            width: 100%;
            padding: 20px;
        }

        .card {
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            border: none;
            background-color: rgba(255, 255, 255, 0.95);
            /* Slight transparency */
        }

        .btn-primary {
            border-radius: 50px;
            padding: 12px 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
        }

        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 30px;
            font-size: 0.9rem;
        }

        /* Heading responsiveness */
        .page-title {
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 576px) {
            .page-title {
                font-size: 1.5rem;
                /* Smaller font on mobile */
            }

            .card {
                padding: 1.5rem !important;
                /* Reduce padding on mobile */
            }
        }
    </style>
</head>

<body>
    <div class="container main-container">
        <div class="row justify-content-center align-items-center h-100">
            <div class="col-12 col-md-8 col-lg-5 col-xl-4">

                <div class="text-center mb-4">
                    <img src="https://www.ritrjpm.ac.in/images/rit-logo-wide-1.png" class="img-fluid mb-3"
                        alt="College Logo" style="max-height: 80px; width: auto;">
                    <h3 class="text-white page-title">On-Duty Management System</h3>
                </div>

                {{ if .LogoutMsg }}
                    <div class="alert alert-success text-center shadow-sm rounded-4">
                        ✅ Logged out successfully.
                    </div>
                {{ end }}

                <div class="card p-4 p-md-5">
                    <h3 class="text-center text-primary mb-4 fw-bold">Login</h3>

                    {{ if .Error }}
                        <div class='alert alert-danger'>{{ .Error }}</div>
                    {{ end }}

                    <form method="POST" action="/login">
                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary">Role</label>
                            <select class="form-select form-select-lg fs-6" name="role" id="roleSelect" required>
                                <option value="" disabled selected>-- Select Role --</option>
                                <option value="student">Student</option>
                                <option value="mentor">Mentor</option>
                                <option value="ca">Class Advisor</option>
                                <option value="ja">Junior Assistant</option>
                                <option value="hod">HOD</option>
                                <option value="principal">Principal</option>
                                <option value="labtech">Lab Technician</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary" id="dynamic-label">Register Number</label>
                            <input type="text" name="register_no" id="dynamic-input"
                                class="form-control form-control-lg fs-6" placeholder="Enter ID" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-secondary">Password (DOB)</label>
                            <input type="date" name="password" class="form-control form-control-lg fs-6" required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg fs-6">Login</button>
                        </div>
                    </form>
                </div>

                <div class="footer">
                    <h6>💻 Developed by Computer Science Engineering Student 💻</h6>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- LOGIC TO CHANGE LABEL BASED ON ROLE ---
        const roleSelect = document.getElementById('roleSelect');
        const dynamicLabel = document.getElementById('dynamic-label');
        const dynamicInput = document.getElementById('dynamic-input');

        // Mapping roles to their display labels
        const roleLabels = {
            'student': 'Register Number',
            'mentor': 'Mentor ID',
            'hod': 'HOD ID',
            'ja': 'JA ID',
            'ca': 'Class Advisor ID',
            'labtech': 'Lab Technician ID',
            'principal': 'Principal ID',
            'admin': 'Admin ID'
        };

        roleSelect.addEventListener('change', function () {
            const selectedRole = this.value;
            if (roleLabels[selectedRole]) {
                dynamicLabel.textContent = roleLabels[selectedRole];
                dynamicInput.placeholder = 'Enter ' + roleLabels[selectedRole];
            }
        });

        // --- EXISTING FORM SUBMISSION VALIDATION ---
        document.querySelector('form').addEventListener('submit', function (e) {
            const role = roleSelect.value;
            const registerNo = dynamicInput.value;
            const existingError = document.getElementById('client-error-msg');

            if (existingError) {
                existingError.remove();
            }

            if (role === 'student') {
                const regex = /^9536\d{2}104\d{3}$/;
                if (!regex.test(registerNo)) {
                    e.preventDefault();
                    const errorDiv = document.createElement('div');
                    errorDiv.id = 'client-error-msg';
                    errorDiv.className = 'alert alert-danger';
                    errorDiv.innerText = 'Invalid Register Number format (Format: 9536xx104xxx)';
                    document.querySelector('form').insertAdjacentElement('beforebegin', errorDiv);
                    document.querySelector('.card').scrollIntoView({ behavior: 'smooth' });
                }
            }
        });
    </script>
</body>

</html>
